name: package
on:
  push:
    tags: ['v*']   # release only on version tags (e.g. v0.2.0), never on every push
  workflow_dispatch: {}   # manual run: builds + uploads artifacts, publishes nothing

permissions:
  contents: write       # create the Release and upload assets
  id-token: write       # OIDC token for build-provenance attestation
  attestations: write   # write the provenance attestation to the repo

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Qt runtime libs
        # Headless ubuntu runners lack the shared libs the Qt platform plugin
        # dlopens (libEGL/libGL/xkbcommon/dbus), which makes even 'offscreen' fail.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 libxcb-cursor0
      - name: Set up venv + deps
        run: |
          python -m venv .venv
          .venv/bin/pip install -e ".[gui]" pyinstaller
      - name: Freeze
        run: cd packaging && ../.venv/bin/pyinstaller romhop.spec
      - name: Smoke test (headless)
        run: QT_QPA_PLATFORM=offscreen packaging/dist/romhop/romhop --smoke-exit
      - name: Install appimagetool
        run: |
          sudo curl -L -o /usr/local/bin/appimagetool \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          sudo chmod +x /usr/local/bin/appimagetool
      - name: Build AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1   # GitHub runners lack FUSE; run appimagetool without it
        run: ./packaging/linux/build_appimage.sh
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/romhop-installer-*.AppImage

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Set up venv + deps
        run: |
          python -m venv .venv
          .venv\Scripts\pip install -e ".[gui]" pyinstaller
      - name: Freeze
        run: cd packaging; ..\.venv\Scripts\pyinstaller romhop.spec
      - name: Smoke test (headless)
        env:
          QT_QPA_PLATFORM: offscreen
        run: packaging\dist\romhop\romhop.exe --smoke-exit
      - name: Compute version
        id: ver
        shell: bash
        run: |
          # Tag push -> clean semver (strip leading 'v'); manual/branch run ->
          # package __version__ + '-dev' so the installer never shows a branch slug.
          if [ '${{ github.ref_type }}' = 'tag' ]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(sed -n 's/^__version__ = "\(.*\)"/\1/p' src/romhop/__init__.py)-dev"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Build installer
        env:
          ROMHOP_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          choco install innosetup --no-progress -y
          iscc packaging\windows\romhop.iss
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: packaging/dist/romhop-setup-*.exe

  release:
    needs: [linux, windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')   # publish a Release only for tag pushes, not manual runs
    steps:
      - uses: actions/checkout@v4   # needed for CHANGELOG.md
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect + checksum
        run: |
          mkdir release
          find artifacts -type f \( -name '*.AppImage' -o -name '*.exe' \) -exec cp {} release/ \;
          cd release && sha256sum * > SHA256SUMS
      - name: Extract release notes
        run: |
          # grab the first "## [..]" section, drop its header line, trim leading blanks
          awk '/^## \[/{n++} n==1' CHANGELOG.md | sed '1d' | sed '/./,$!d' > NOTES.md
      - name: Publish Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body_path: NOTES.md
          prerelease: ${{ contains(github.ref_name, '-') }}
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: release/*
